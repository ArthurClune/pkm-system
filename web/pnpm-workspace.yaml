allowBuilds:
  esbuild: true
# Force a single katex install: mermaid@11.16.0 pins its own transitive
# katex@0.16.47, which otherwise ships as a second ~260KB lazy chunk
# alongside our direct katex@0.17.0 dependency (pkm-zotb).
overrides:
  katex: ^0.17.0
# pdfjs-dist is react-pdf's pinned dependency (deliberately NOT a direct
# dependency, so react-pdf's pin stays the single source of version truth).
# PdfViewer.tsx references its worker by bare specifier
# (new URL("pdfjs-dist/build/pdf.worker.min.mjs", import.meta.url)), which
# pnpm's strict layout would otherwise make unresolvable from app code.
publicHoistPattern:
  - pdfjs-dist
